{% extends 'base.html' %}
{% block content %}

<div class="max-w-3xl mx-auto px-6 py-10 flex-grow flex flex-col h-[75vh]">
    <!-- Chat Container Box - Glassmorphism -->
    <div class="bg-[#0B0806]/60 backdrop-blur-xl border border-white/10 rounded-3xl flex flex-col flex-grow overflow-hidden shadow-2xl">
        
        <!-- Bot Header -->
        <div class="bg-white/5 p-5 flex items-center gap-4 border-b border-white/10">
            <div class="w-11 h-11 bg-[#C09668] rounded-2xl flex items-center justify-center text-[#0B0806] text-xl shadow-lg shadow-[#C09668]/20">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div>
                <h2 class="font-bold text-white text-base leading-tight">CoffeeBot AI</h2>
                <span class="text-xs text-white/50 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500 block animate-pulse"></span> Online</span>
            </div>
        </div>

        <!-- Message logs -->
        <div id="chat-window" class="flex-grow p-6 overflow-y-auto space-y-4">
            <div class="flex gap-3 max-w-[85%]">
                <div class="w-8 h-8 bg-white/10 text-white rounded-xl flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-robot"></i></div>
                <div class="bg-white/5 border border-white/10 px-4 py-3 rounded-2xl rounded-tl-none text-sm text-white shadow-sm">
                    Kamusta! Ako si CoffeeBot. Handa akong mag-recommend ng perfect na kape para sa'yo ngayon!
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="p-4 border-t border-white/10 bg-white/5">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="user-message" required placeholder="Magtanong tungkol sa aming mga kape..." autocomplete="off" 
                       class="flex-grow px-5 py-3.5 bg-black/20 text-white rounded-xl border border-white/10 text-sm focus:outline-none focus:border-[#C09668] transition-all">
                <button type="submit" class="bg-[#C09668] hover:bg-[#A88157] text-[#0B0806] px-5 rounded-xl shadow-md transition-all active:scale-95">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('chat-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const messageInput = document.getElementById('user-message');
        const chatWindow = document.getElementById('chat-window');
        const userText = messageInput.value.trim();
        
        if(!userText) return;

        // User Message Bubble
        chatWindow.insertAdjacentHTML('beforeend', `
            <div class="flex gap-3 max-w-[85%] ml-auto flex-row-reverse">
                <div class="w-8 h-8 bg-[#C09668] text-[#0B0806] rounded-xl flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-user"></i></div>
                <div class="bg-[#C09668] text-[#0B0806] px-4 py-3 rounded-2xl rounded-tr-none text-sm shadow-sm">${userText}</div>
            </div>`);
        messageInput.value = '';
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Loading
        const loadId = 'load-' + Date.now();
        chatWindow.insertAdjacentHTML('beforeend', `<div id="${loadId}" class="flex gap-3 max-w-[85%]"><div class="w-8 h-8 bg-white/10 text-white rounded-xl flex items-center justify-center"><i class="fa-solid fa-robot"></i></div><div class="bg-white/5 border border-white/10 px-4 py-3 rounded-2xl text-white/50 text-sm">Nag-iisip...</div></div>`);

        try {
            const formData = new FormData();
            formData.append('message', userText);
            const res = await fetch("{{ url_for('chat') }}", { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById(loadId).remove();
            
            // Bot Response
            chatWindow.insertAdjacentHTML('beforeend', `
                <div class="flex gap-3 max-w-[85%]">
                    <div class="w-8 h-8 bg-white/10 text-white rounded-xl flex items-center justify-center"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-white/5 border border-white/10 px-4 py-3 rounded-2xl rounded-tl-none text-sm text-white shadow-sm whitespace-pre-line">${data.reply}</div>
                </div>`);
        } catch (err) { document.getElementById(loadId).remove(); }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });
</script>
{% endblock %}
