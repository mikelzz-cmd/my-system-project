{% extends 'admin/layout.html' %}
{% block admin_content %}

<div class="mb-8">
    <a href="{{ url_for('admin_products') }}" class="inline-flex items-center gap-2 text-white/40 hover:text-white text-sm font-semibold transition mb-4">
        <i class="fa-solid fa-arrow-left text-xs"></i> Back to Products
    </a>
    <h1 class="text-3xl font-bold text-white">{{ "Edit Product" if product else "Add Product" }}</h1>
</div>

<div class="bg-[#0B0806]/60 border border-white/5 rounded-[2rem] p-8 max-w-2xl">

    <form action="{{ url_for('admin_edit_product', product_id=product.id) if product else url_for('admin_add_product') }}"
          method="POST" enctype="multipart/form-data" class="space-y-6">

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        {% if product and product.image %}
        <div>
            <img src="{{ product.image }}" class="w-32 h-32 object-cover rounded-2xl border border-white/10">
        </div>
        {% endif %}

        <div>
            <label class="text-xs text-white/40 uppercase font-bold tracking-widest ml-1">Product Photo</label>
            <label class="mt-2 flex items-center gap-3 cursor-pointer bg-[#1a1714] hover:bg-[#25201c] transition text-white px-5 py-4 rounded-2xl border border-white/5 text-sm font-semibold">
                <i class="fa-solid fa-image"></i>
                {{ "Choose New Photo" if product else "Choose Photo" }}
                <input type="file" name="image" accept="image/*" class="hidden">
            </label>
            <p class="text-[11px] text-white/30 mt-2">PNG, JPG, JPEG, GIF, or WEBP{{ " — leave blank to keep the current photo" if product else "" }}</p>
        </div>

        <div>
            <label class="text-xs text-white/40 uppercase font-bold tracking-widest ml-1">Product Name</label>
            <input type="text" name="product_name" required value="{{ product.product_name if product else '' }}"
                   class="mt-2 w-full bg-[#1a1714] border border-white/5 rounded-2xl p-4 text-white focus:border-[#C09668] outline-none transition-all">
        </div>

        <div class="grid sm:grid-cols-2 gap-6">
            <div>
                <label class="text-xs text-white/40 uppercase font-bold tracking-widest ml-1">Category</label>
                <input type="text" name="category" placeholder="e.g. Hot Coffee, Pastry" value="{{ product.category if product else '' }}"
                       class="mt-2 w-full bg-[#1a1714] border border-white/5 rounded-2xl p-4 text-white focus:border-[#C09668] outline-none transition-all">
            </div>
            <div>
                <label class="text-xs text-white/40 uppercase font-bold tracking-widest ml-1">Price (₱)</label>
                <input type="number" step="0.01" min="0" name="price" required value="{{ product.price if product else '' }}"
                       class="mt-2 w-full bg-[#1a1714] border border-white/5 rounded-2xl p-4 text-white focus:border-[#C09668] outline-none transition-all">
            </div>
        </div>

        <div>
            <label class="text-xs text-white/40 uppercase font-bold tracking-widest ml-1">Description</label>
            <textarea name="description" rows="3"
                      class="mt-2 w-full bg-[#1a1714] border border-white/5 rounded-2xl p-4 text-white focus:border-[#C09668] outline-none transition-all">{{ product.description if product else '' }}</textarea>
        </div>

        <button type="submit" class="w-full bg-[#C09668] hover:bg-[#A88157] text-[#0B0806] font-bold py-4 rounded-2xl transition-all active:scale-[0.98]">
            {{ "Save Changes" if product else "Add Product" }}
        </button>

    </form>

</div>

{% endblock %}
