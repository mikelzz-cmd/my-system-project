{% extends 'base.html' %}
{% block content %}
<div class="max-w-7xl mx-auto px-6 py-10">

    <div class="grid lg:grid-cols-5 gap-8">

        <!-- ADMIN SIDEBAR -->
        <aside class="lg:col-span-1">
            <div class="bg-[#0B0806]/60 backdrop-blur-2xl border border-white/5 rounded-[2rem] p-4 lg:sticky lg:top-28">

                <p class="text-[10px] uppercase tracking-widest text-[#C09668] font-bold px-4 pt-2 pb-4">
                    <i class="fa-solid fa-user-shield mr-1.5"></i> Admin Panel
                </p>

                <nav class="space-y-1">

                    <a href="{{ url_for('admin_dashboard') }}"
                       class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-semibold transition
                       {% if request.path == url_for('admin_dashboard') %}
                           bg-[#C09668]/15 text-[#C09668] border border-[#C09668]/30
                       {% else %}
                           text-white/60 border border-transparent hover:bg-white/5 hover:text-white
                       {% endif %}">
                        <i class="fa-solid fa-gauge w-5 text-center"></i>
                        Overview
                    </a>

                    <a href="{{ url_for('admin_products') }}"
                       class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-semibold transition
                       {% if request.path.startswith(url_for('admin_products')) %}
                           bg-[#C09668]/15 text-[#C09668] border border-[#C09668]/30
                       {% else %}
                           text-white/60 border border-transparent hover:bg-white/5 hover:text-white
                       {% endif %}">
                        <i class="fa-solid fa-mug-hot w-5 text-center"></i>
                        Products
                    </a>

                    <a href="{{ url_for('admin_orders') }}"
                       class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-semibold transition
                       {% if request.path == url_for('admin_orders') %}
                           bg-[#C09668]/15 text-[#C09668] border border-[#C09668]/30
                       {% else %}
                           text-white/60 border border-transparent hover:bg-white/5 hover:text-white
                       {% endif %}">
                        <i class="fa-solid fa-receipt w-5 text-center"></i>
                        Orders
                    </a>

                    <a href="{{ url_for('admin_users') }}"
                       class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-semibold transition
                       {% if request.path == url_for('admin_users') %}
                           bg-[#C09668]/15 text-[#C09668] border border-[#C09668]/30
                       {% else %}
                           text-white/60 border border-transparent hover:bg-white/5 hover:text-white
                       {% endif %}">
                        <i class="fa-solid fa-users w-5 text-center"></i>
                        Users
                    </a>

                    <div class="h-px bg-white/5 my-2"></div>

                    <a href="{{ url_for('dashboard') }}"
                       class="flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-semibold text-white/40 border border-transparent hover:bg-white/5 hover:text-white transition">
                        <i class="fa-solid fa-arrow-left w-5 text-center"></i>
                        Back to Site
                    </a>

                </nav>

            </div>
        </aside>

        <!-- ADMIN CONTENT -->
        <div class="lg:col-span-4">
            {% block admin_content %}{% endblock %}
        </div>

    </div>

</div>
{% endblock %}
